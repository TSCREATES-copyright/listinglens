<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 
    Favicon Concept: ListingLens
    - Outer shape: Price tag (resale pricing)
    - Inner core: Circular lens ring (evaluation)
    - Center dot: Valuation focus
    - Palette: Forest black (#1A1F16), Gold (#D4AF37), Cool Gray (#8C92AC), Bright Lime (#32CD32)
  -->
  <defs>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1F16" />
      <stop offset="100%" stop-color="#2A3223" />
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA8C2C" />
    </linearGradient>
  </defs>
  
  <!-- Price Tag Body -->
  <path d="M15 30 L50 10 L85 30 L85 90 L15 90 Z" fill="url(#tagGrad)" stroke="#8C92AC" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Tag Hole -->
  <circle cx="50" cy="22" r="4" fill="#FFFFFF" />
  
  <!-- Lens Ring -->
  <circle cx="50" cy="55" r="24" fill="none" stroke="url(#lensGrad)" stroke-width="6" />
  <circle cx="50" cy="55" r="18" fill="none" stroke="#8C92AC" stroke-width="2" />
  
  <!-- Center Focus / Item Silhouette (Box) -->
  <rect x="44" y="49" width="12" height="12" fill="#32CD32" rx="2" />
  <circle cx="50" cy="55" r="2" fill="#1A1F16" />
</svg>
